<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galaxy SMP - A private, friends-only Minecraft server.">
    <title>Galaxy SMP | Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090f;
            --card-bg: rgba(20, 24, 36, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --discord-color: #5865F2;
            --online: #22c55e;
            --offline: #ef4444;
            --checking: #facc15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a1528 0%, #07090f 70%);
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tag {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .ip-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
        }

        .label {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .ip-text { 
            font-family: monospace; 
            font-size: 1.15rem; 
            color: #fff; 
            display: block; 
            margin-bottom: 12px; 
            word-break: break-all;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .discord-btn {
            display: block;
            background: var(--discord-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            transition: 0.2s;
        }

        .status-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); transition: 0.3s; }

        /* Status Colors */
        .checking .dot { background-color: var(--checking); box-shadow: 0 0 10px var(--checking); animation: pulse 1s infinite; }
        .online .dot { background-color: var(--online); box-shadow: 0 0 15px var(--online); animation: pulse 2s infinite; }
        .offline .dot { background-color: var(--offline); box-shadow: 0 0 10px var(--offline); }

        .player-info { margin-top: 15px; display: none; }
        .player-count { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .player-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 2.2rem; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tag">Friends Only</div>
        <h1>Galaxy SMP</h1>
        <p>A private vanilla survival experience. Copy the info below and join the galaxy.</p>

        <div class="info-grid">
            <div class="ip-box">
                <span class="label">Server IP</span>
                <span class="ip-text" id="server-ip">galaxysmpisthis.aternos.me</span>
                <button class="copy-btn" onclick="copyText('server-ip', 'btn-ip')" id="btn-ip">Copy IP</button>
            </div>

            <div class="ip-box">
                <span class="label">Server Port</span>
                <span class="ip-text" id="server-port">47475</span>
                <button class="copy-btn" onclick="copyText('server-port', 'btn-port')" id="btn-port">Copy Port</button>
            </div>
        </div>

        <a href="https://discord.gg/cxE5jsMMkr" target="_blank" class="discord-btn">Join Discord Server</a>

        <div class="status-card">
            <div id="status-container" class="status checking">
                <div class="dot"></div>
                <span id="status-text" style="color: var(--checking);">Pinging Server...</span>
            </div>
            <div class="player-info" id="player-info">
                <div class="player-count" id="player-numbers">0 / 0</div>
                <div class="player-label">Active Explorers</div>
            </div>
        </div>
    </div>

    <script>
        function copyText(elementId, btnId) {
            const text = document.getElementById(elementId).innerText;
            const btn = document.getElementById(btnId);
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "#22c55e";
                setTimeout(() => {
                    btn.innerText = old;
                    btn.style.background = "var(--accent)";
                }, 2000);
            });
        }

        async function updateStatus() {
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const playerInfo = document.getElementById('player-info');
            const playerNumbers = document.getElementById('player-numbers');

            // 1. Immediately show that a check is happening
            statusContainer.className = "status checking";
            statusText.innerText = "Pinging Server...";
            statusText.style.color = "var(--checking)";
            
            try {
                // 2. Use mcsrvstat.us (Better for Aternos detection)
                const response = await fetch('https://api.mcsrvstat.us/2/galaxysmpisthis.aternos.me:47475');
                const data = await response.json();

                // 3. Update UI based on real status
                if (data.online) {
                    statusContainer.className = "status online";
                    statusText.innerText = "Server Active";
                    statusText.style.color = "var(--online)";
                    
                    playerInfo.style.display = "block";
                    // mcsrvstat.us uses 'data.players.online' instead of 'data.players.now'
                    const currentPlayers = data.players ? data.players.online : 0;
                    const maxPlayers = data.players ? data.players.max : 20;
                    playerNumbers.innerText = `${currentPlayers} / ${maxPlayers}`;
                } else {
                    statusContainer.className = "status offline";
                    statusText.innerText = "Server Sleeping"; // Aternos specific phrasing
                    statusText.style.color = "var(--offline)";
                    playerInfo.style.display = "none";
                }
            } catch (e) {
                statusContainer.className = "status offline";
                statusText.innerText = "Ping Failed";
                statusText.style.color = "var(--offline)";
                playerInfo.style.display = "none";
            }
        }

        // Run instantly when the page opens
        updateStatus();
        
        // Then ping the server every 20 seconds to keep it live
        setInterval(updateStatus, 2000);
    </script>

</body>
</html>
