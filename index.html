<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galaxy SMP - A private, friends-only Minecraft server.">
    <title>Galaxy SMP | Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090f;
            --card-bg: rgba(20, 24, 36, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --discord-color: #5865F2;
            --online: #22c55e;
            --offline: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1a1528 0%, #07090f 70%);
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; border-radius: 20px; }
            h1 { font-size: 2.2rem !important; }
            .ip-text { font-size: 0.9rem !important; }
        }

        .tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .ip-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem;
            border-radius: 14px;
            text-align: center;
        }

        .label {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .ip-text { font-family: monospace; font-size: 1.1rem; color: #fff; display: block; margin-bottom: 10px; word-break: break-all; }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 0;
            width: 100%;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .discord-btn {
            display: block;
            background: var(--discord-color);
            color: white;
            text-decoration: none;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            transition: 0.2s;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }

        .online .dot {
            background-color: var(--online);
            box-shadow: 0 0 12px var(--online);
            animation: pulse 2s infinite;
        }

        .offline .dot { background-color: var(--offline); box-shadow: 0 0 12px var(--offline); }

        .player-info { margin-top: 10px; display: none; }
        .player-count { font-size: 1.5rem; font-weight: 700; }
        .player-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tag">Friends Only</div>
        <h1>Galaxy SMP</h1>
        <p>A private vanilla survival experience. Copy the info below to join.</p>

        <div class="info-grid">
            <div class="ip-box">
                <span class="label">Server IP</span>
                <span class="ip-text" id="server-ip">galaxysmpisthis.aternos.me</span>
                <button class="copy-btn" onclick="copyText('server-ip', 'btn-ip')" id="btn-ip">Copy IP</button>
            </div>

            <div class="ip-box">
                <span class="label">Server Port</span>
                <span class="ip-text" id="server-port">47475</span>
                <button class="copy-btn" onclick="copyText('server-port', 'btn-port')" id="btn-port">Copy Port</button>
            </div>
        </div>

        <a href="https://discord.gg/cxE5jsMMkr" target="_blank" class="discord-btn">Join Discord Server</a>

        <div class="status-card">
            <div id="status-container" class="status">
                <div class="dot"></div>
                <span id="status-text">Checking Status...</span>
            </div>
            <div class="player-info" id="player-info">
                <div class="player-count" id="player-numbers">0 / 0</div>
                <div class="player-label">Players Online</div>
            </div>
        </div>
    </div>

    <script>
        function copyText(elementId, btnId) {
            const text = document.getElementById(elementId).innerText;
            const btn = document.getElementById(btnId);
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "#22c55e";
                setTimeout(() => {
                    btn.innerText = old;
                    btn.style.background = "var(--accent)";
                }, 2000);
            });
        }

        async function updateStatus() {
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const playerInfo = document.getElementById('player-info');
            const playerNumbers = document.getElementById('player-numbers');

            try {
                const response = await fetch('https://mcapi.us/server/status?ip=galaxysmpisthis.aternos.me&port=47475');
                const data = await response.json();

                if (data.online) {
                    statusContainer.className = "status online";
                    statusText.innerText = "Server Online";
                    statusText.style.color = "var(--online)";
                    playerInfo.style.display = "block";
                    playerNumbers.innerText = `${data.players.now} / ${data.players.max}`;
                } else {
                    statusContainer.className = "status offline";
                    statusText.innerText = "Server Offline";
                    statusText.style.color = "var(--offline)";
                    playerInfo.style.display = "none";
                }
            } catch (e) {
                statusText.innerText = "Offline";
                statusContainer.className = "status offline";
            }
        }

        updateStatus();
        setInterval(updateStatus, 30000);
    </script>
</body>
</html>
