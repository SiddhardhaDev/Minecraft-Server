<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galaxy SMP - A private, friends-only Minecraft server.">
    <title>Galaxy SMP | Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #07090f;
            --card-bg: rgba(20, 24, 36, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* A subtle animated gradient background */
            background: radial-gradient(circle at 50% 0%, #1a1528 0%, #07090f 70%);
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        .tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .ip-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .ip-box:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .ip-text {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tag">Friends Only</div>
        <h1>Galaxy SMP</h1>
        <p>A private vanilla survival experience. Grab your gear, hop in the Discord, and let's build something incredible.</p>

        <div class="ip-box">
            <span class="ip-text" id="server-ip">galaxysmpisthis.com</span>
            <button class="copy-btn" onclick="copyIP()" id="btn-text">Copy IP</button>
        </div>

        <div class="status">
            <div class="dot"></div>
            <span>Server is Online</span>
        </div>
    </div>

    <script>
        function copyIP() {
            const ip = document.getElementById("server-ip").innerText;
            navigator.clipboard.writeText(ip).then(() => {
                const btn = document.getElementById("btn-text");
                btn.innerText = "Copied!";
                btn.style.background = "#22c55e"; // Turns green
                
                setTimeout(() => {
                    btn.innerText = "Copy IP";
                    btn.style.background = "var(--accent)"; // Reverts to purple
                }, 2000);
            });
        }
    </script>

</body>
</html>
